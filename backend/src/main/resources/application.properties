spring.application.name=backend

spring.cache.cache-names=cache1,cache2
spring.cache.couchbase.expiration=10m

# Reemplaza 'tu-realm' con el nombre real de tu realm en Keycloak
# y 'localhost:8080' con la URL de tu servidor Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/tu-realm

# Opcional pero recomendado: acelera el inicio de la app al no tener que
# hacer la primera peticiˇn a Keycloak para obtener las claves.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/tu-realm/protocol/openid-connect/certs