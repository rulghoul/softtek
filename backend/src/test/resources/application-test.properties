# --- H2 Database ---
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS ADISTEMDB\;SET SCHEMA ADISTEMDB
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=inventario

# --- Data Initialization ---
# Desactivamos la inicialización con scripts si usas TestDataCreator

spring.sql.init.mode=ALWAYS
spring.sql.init.data-locations=classpath:data.sql

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console